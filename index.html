<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELLA AI Intel | AI Intelligence Dashboard</title>
<meta name="description" content="AI 최신 정보 대시보드 - Claude, Claude Code, API, AI 트렌드를 한눈에. BELLA AI 자동화 팀 운영.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #d97757;
    --primary-dark: #c4613c;
    --primary-light: #fdf0eb;
    --primary-lighter: #fef8f5;
    --accent: #eda100;
    --accent-light: #fef8e7;
    --dark: #1a1a19;
    --gray-900: #2d2d2b;
    --gray-700: #4a4a47;
    --gray-500: #87867f;
    --gray-300: #c8c6be;
    --gray-200: #e5e4dc;
    --gray-100: #f5f4ed;
    --white: #ffffff;
    --success: #5a9a72;
    --info: #5b8dd9;
    --gradient: linear-gradient(135deg, #d97757 0%, #c4613c 100%);
    --gradient-subtle: linear-gradient(135deg, #fdf0eb 0%, #fef8f5 100%);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
    color: var(--gray-900);
    line-height: 1.6;
    background: var(--gray-100);
    min-height: 100vh;
  }

  body.zh { font-family: 'Noto Sans TC', 'Inter', -apple-system, sans-serif; }

  a { color: var(--primary); text-decoration: none; }
  a:hover { color: var(--primary-dark); }

  /* Language System */
  .lang-ko { display: inline; }
  .lang-zh { display: none; }
  .lang-ko-block { display: block; }
  .lang-zh-block { display: none; }
  body.zh .lang-ko { display: none; }
  body.zh .lang-zh { display: inline; }
  body.zh .lang-ko-block { display: none; }
  body.zh .lang-zh-block { display: block; }

  /* ===== HEADER ===== */
  .header {
    background: var(--dark);
    color: var(--white);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--gray-300); font-weight: 400; }

  .clock {
    font-family: 'Inter', monospace;
    font-size: 0.85rem;
    color: var(--gray-300);
    background: rgba(255,255,255,0.08);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lang-btn {
    background: transparent;
    border: 1px solid var(--gray-500);
    color: var(--gray-300);
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .lang-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--white);
  }

  .header-link {
    color: var(--gray-300);
    font-size: 0.8rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .header-link:hover {
    color: var(--white);
    border-color: var(--primary);
    background: rgba(217,119,87,0.15);
  }

  /* ===== STATUS BAR ===== */
  .status-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 10px 0;
  }

  .status-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--gray-700);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-badge {
    background: var(--primary-light);
    color: var(--primary-dark);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  /* ===== FILTERS ===== */
  .filters {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 24px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    background: var(--white);
    border: 1px solid var(--gray-200);
    color: var(--gray-700);
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.82rem;
    transition: all 0.2s;
    font-family: inherit;
  }

  .filter-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .filter-btn.active {
    background: var(--gradient);
    border-color: var(--primary);
    color: var(--white);
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 320px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 6px 16px 6px 36px;
    border: 1px solid var(--gray-200);
    border-radius: 20px;
    font-size: 0.82rem;
    font-family: inherit;
    background: var(--white);
    color: var(--gray-900);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--primary);
  }

  .search-box::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
  }

  .time-filter {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .time-btn {
    background: transparent;
    border: 1px solid var(--gray-200);
    color: var(--gray-500);
    padding: 4px 10px;
    border-radius: 16px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: inherit;
    transition: all 0.2s;
  }

  .time-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--white);
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    max-width: 1200px;
    margin: 16px auto 0;
    padding: 0 24px 40px;
  }

  /* ===== NEWS CARDS ===== */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 20px;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    box-shadow: var(--shadow-lg);
    border-color: var(--primary);
    transform: translateY(-2px);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-category {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cat-claude_release { background: #fdf0eb; color: #c4613c; }
  .cat-claude_code { background: #eef2ff; color: #4f46e5; }
  .cat-claude_api { background: #f0fdf4; color: #16a34a; }
  .cat-ai_trend { background: #fef8e7; color: #b45309; }
  .cat-automation { background: #fdf2f8; color: #be185d; }
  .cat-content_sns { background: #f5f3ff; color: #7c3aed; }

  .card-date {
    font-size: 0.72rem;
    color: var(--gray-500);
    white-space: nowrap;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-summary {
    font-size: 0.82rem;
    color: var(--gray-700);
    line-height: 1.55;
    flex: 1;
    margin-bottom: 12px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 0.68rem;
    color: var(--primary);
    background: var(--primary-lighter);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(217,119,87,0.15);
  }

  .card-actions {
    display: flex;
    gap: 6px;
    border-top: 1px solid var(--gray-100);
    padding-top: 10px;
  }

  .action-btn {
    background: var(--gray-100);
    border: none;
    color: var(--gray-700);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.72rem;
    font-family: inherit;
    transition: all 0.2s;
  }

  .action-btn:hover {
    background: var(--primary-light);
    color: var(--primary-dark);
  }

  /* ===== STATS SECTION ===== */
  .stats-section {
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: var(--white);
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
    padding: 16px;
    text-align: center;
  }

  .stat-number {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--primary);
    font-family: 'Inter', sans-serif;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--gray-500);
    margin-top: 2px;
  }

  /* ===== FOOTER ===== */
  .footer {
    background: var(--dark);
    color: var(--gray-300);
    padding: 24px 0;
    margin-top: 40px;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 0.8rem;
  }

  .footer-links {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .footer-links a {
    color: var(--gray-300);
    font-size: 0.78rem;
  }

  .footer-links a:hover { color: var(--primary); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-500);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .header-inner { padding: 10px 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .filter-row { gap: 6px; }
    .search-box { min-width: 100%; max-width: 100%; order: -1; }
    .time-filter { width: 100%; justify-content: flex-start; margin-left: 0; }
    .stats-section { grid-template-columns: repeat(3, 1fr); }
    .header-link { display: none; }
  }

  @media (max-width: 480px) {
    .stats-section { grid-template-columns: repeat(2, 1fr); }
  }

  /* Recommendation cards */
  .rec-section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rec-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--primary);
    border-left: 4px solid var(--primary);
    padding: 16px 20px;
    margin-bottom: 12px;
    transition: all 0.25s;
  }

  .rec-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
  }

  .rec-card .rec-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }

  .rec-card .rec-title {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--dark);
  }

  .rec-card .rec-meta {
    font-size: 0.78rem;
    color: var(--gray-500);
  }

  .rec-card .rec-body {
    font-size: 0.82rem;
    color: var(--gray-700);
    margin: 6px 0;
    line-height: 1.5;
  }

  .rec-card .rec-project {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary-dark);
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: 600;
  }

  .rec-card .stars {
    color: var(--accent);
    font-size: 0.85rem;
  }

  .rec-card .learning-note {
    background: var(--gray-100);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--gray-700);
    line-height: 1.5;
    white-space: pre-line;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--dark);
    color: var(--white);
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 0.82rem;
    z-index: 1000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">BELLA AI <span>Intel</span></div>
      <div class="clock" id="clock">--:--:-- KST</div>
    </div>
    <div class="header-right">
      <button class="lang-btn active" onclick="setLang('ko')" id="btn-ko">KO</button>
      <button class="lang-btn" onclick="setLang('zh')" id="btn-zh">中文</button>
      <a class="header-link" href="https://bellaliv423.github.io/bella-ai/" target="_blank">BELLA AI</a>
      <a class="header-link" href="https://github.com/bellaliv423/bella-ai-intel" target="_blank">GitHub</a>
      <a class="header-link" href="https://claude.ai" target="_blank">Claude</a>
    </div>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-inner">
    <div class="status-item">
      <div class="status-dot"></div>
      <span class="lang-ko">자동 수집 활성</span>
      <span class="lang-zh">自動收集啟用中</span>
    </div>
    <div class="status-item">
      <span class="lang-ko">마지막 수집:</span>
      <span class="lang-zh">最後收集：</span>
      <strong id="last-updated">--</strong>
    </div>
    <div class="status-item">
      <span class="status-badge" id="total-count">0</span>
      <span class="lang-ko">건 수집</span>
      <span class="lang-zh">筆資料</span>
    </div>
    <div class="status-item">
      <button class="action-btn" onclick="shareLink()">
        <span class="lang-ko">공유 링크 복사</span>
        <span class="lang-zh">複製分享連結</span>
      </button>
    </div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-row">
    <button class="filter-btn active" data-cat="all" onclick="filterCategory('all', this)">
      <span class="lang-ko">전체</span>
      <span class="lang-zh">全部</span>
    </button>
    <button class="filter-btn" data-cat="claude_release" onclick="filterCategory('claude_release', this)">
      🚀 <span class="lang-ko">Claude 릴리즈</span><span class="lang-zh">Claude 發布</span>
    </button>
    <button class="filter-btn" data-cat="claude_code" onclick="filterCategory('claude_code', this)">
      💻 Claude Code
    </button>
    <button class="filter-btn" data-cat="claude_api" onclick="filterCategory('claude_api', this)">
      🔌 API/SDK
    </button>
    <button class="filter-btn" data-cat="ai_trend" onclick="filterCategory('ai_trend', this)">
      📈 <span class="lang-ko">AI 트렌드</span><span class="lang-zh">AI 趨勢</span>
    </button>
    <button class="filter-btn" data-cat="automation" onclick="filterCategory('automation', this)">
      ⚡ <span class="lang-ko">자동화</span><span class="lang-zh">自動化</span>
    </button>
    <button class="filter-btn" data-cat="content_sns" onclick="filterCategory('content_sns', this)">
      📱 <span class="lang-ko">콘텐츠</span><span class="lang-zh">內容</span>
    </button>
    <button class="filter-btn" data-cat="dreamteam" onclick="showDreamTeam(this)" style="border-color:var(--primary);color:var(--primary);font-weight:600">
      ⭐ <span class="lang-ko">드림팀 추천</span><span class="lang-zh">夢幻團隊推薦</span>
    </button>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="검색... (제목, 해시태그)" oninput="searchItems()">
    </div>

    <div class="time-filter">
      <button class="time-btn active" data-time="all" onclick="filterTime('all', this)">
        <span class="lang-ko">전체</span><span class="lang-zh">全部</span>
      </button>
      <button class="time-btn" data-time="7" onclick="filterTime('7', this)">7D</button>
      <button class="time-btn" data-time="14" onclick="filterTime('14', this)">14D</button>
      <button class="time-btn" data-time="30" onclick="filterTime('30', this)">30D</button>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="main">
  <!-- Stats -->
  <div class="stats-section" id="stats-section"></div>

  <!-- Cards Grid -->
  <div class="cards-grid" id="cards-grid">
    <div class="empty-state">
      <div class="icon">📡</div>
      <p class="lang-ko">데이터를 불러오는 중...</p>
      <p class="lang-zh">正在載入資料...</p>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div>
      <span class="lang-ko">BELLA AI Intel Dashboard | AI 드림팀 자동 수집</span>
      <span class="lang-zh">BELLA AI Intel Dashboard | AI 夢幻團隊自動收集</span>
    </div>
    <div class="footer-links">
      <a href="https://bellaliv423.github.io/bella-ai/" target="_blank">BELLA AI</a>
      <a href="https://bellaliv423.github.io/bella-obsidian/" target="_blank">Obsidian</a>
      <a href="https://github.com/bellaliv423/bella-ai-intel" target="_blank">GitHub</a>
      <a href="https://claude.ai" target="_blank">Claude AI</a>
      <a href="https://www.reddit.com/r/ClaudeAI/" target="_blank" style="color:#ff4500">Reddit r/ClaudeAI</a>
      <a href="https://www.linkedin.com/showcase/claude/posts/?feedView=all" target="_blank" style="color:#0a66c2">LinkedIn Claude</a>
    </div>
  </div>
</footer>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== LANGUAGE =====
function setLang(lang) {
  document.body.classList.toggle('zh', lang === 'zh');
  document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('search-input').placeholder = lang === 'ko' ? '검색... (제목, 해시태그)' : '搜尋... (標題, 標籤)';
  localStorage.setItem('bella-intel-lang', lang);
}

// Init language
(function() {
  const saved = localStorage.getItem('bella-intel-lang');
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang) setLang(urlLang);
  else if (saved) setLang(saved);
})();

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const h = String(kst.getHours()).padStart(2, '0');
  const m = String(kst.getMinutes()).padStart(2, '0');
  const s = String(kst.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} KST`;
}
setInterval(updateClock, 1000);
updateClock();

// ===== DATA =====
let allItems = [];
let currentCategory = 'all';
let currentTimeDays = 'all';
let searchQuery = '';

const CATEGORY_META = {
  claude_release: { ko: 'Claude 릴리즈', zh: 'Claude 發布', icon: '🚀' },
  claude_code: { ko: 'Claude Code', zh: 'Claude Code', icon: '💻' },

async function loadData() {
  try {
    const resp = await fetch('data/latest.json');
    if (!resp.ok) throw new Error('No data file');
    const data = await resp.json();
    allItems = data.items || [];
    document.getElementById('last-updated').textContent = data.stats?.last_collection || '--';
    document.getElementById('total-count').textContent = allItems.length;
    renderStats(data.stats);
    renderCards();
  } catch (e) {
    // Use embedded seed data on first load
    loadSeedData();
  }
}

function loadSeedData() {
  allItems = SEED_DATA;
  document.getElementById('last-updated').textContent = '2026-03-23 (seed)';
  document.getElementById('total-count').textContent = allItems.length;
  renderStats({ total_items: allItems.length, categories: countCategories() });
  renderCards();
}

function countCategories() {
  const counts = {};
  allItems.forEach(item => {
    counts[item.category] = (counts[item.category] || 0) + 1;
  });
  return counts;
}

// ===== RENDER STATS =====
function renderStats(stats) {
  const cats = stats?.categories || countCategories();
  const isZh = document.body.classList.contains('zh');
  let html = '';

  html += `<div class="stat-card">
    <div class="stat-number">${stats?.total_items || allItems.length}</div>
    <div class="stat-label">${isZh ? '總收集數' : '총 수집'}</div>
  </div>`;

  for (const [cat, count] of Object.entries(cats)) {
    const meta = CATEGORY_META[cat] || { ko: cat, zh: cat, icon: '📋' };
    html += `<div class="stat-card">
      <div class="stat-number">${count}</div>
      <div class="stat-label">${meta.icon} ${isZh ? meta.zh : meta.ko}</div>
    </div>`;
  }

  document.getElementById('stats-section').innerHTML = html;
}

// ===== RENDER CARDS =====
function renderCards() {
  const filtered = filterItems();
  const isZh = document.body.classList.contains('zh');
  const grid = document.getElementById('cards-grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">🔍</div>
      <p>${isZh ? '沒有找到符合條件的資料' : '조건에 맞는 데이터가 없습니다'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const meta = CATEGORY_META[item.category] || { ko: 'etc', zh: 'etc', icon: '📋' };
    const summary = isZh ? (item.summary_zh || item.summary_ko) : item.summary_ko;
    const tags = (item.hashtags || []).map(t => `<span class="tag">${t}</span>`).join('');

    return `<article class="card" data-category="${item.category}" data-date="${item.date}">
      <div class="card-header">
        <span class="card-category cat-${item.category}">${meta.icon} ${isZh ? meta.zh : meta.ko}</span>
        <span class="card-date">${item.date}</span>
      </div>
      <h3 class="card-title">${item.title}</h3>
      <p class="card-summary">${summary || ''}</p>
      <div class="card-tags">${tags}</div>
      <div class="card-actions">
        <button class="action-btn" onclick="copyCard('${encodeURIComponent(item.title)}', '${encodeURIComponent(summary || '')}')">
          ${isZh ? '📋 複製' : '📋 복사'}
        </button>
        ${item.url ? `<a class="action-btn" href="${item.url}" target="_blank">${isZh ? '🔗 原文' : '🔗 원문'}</a>` : ''}
        <button class="action-btn" onclick="shareCard('${encodeURIComponent(item.title)}')">
          ${isZh ? '📤 分享' : '📤 공유'}
        </button>
      </div>
    </article>`;
  }).join('');
}

// ===== FILTER LOGIC =====
function filterItems() {
  let items = [...allItems];

  // Category filter
  if (currentCategory !== 'all') {
    items = items.filter(i => i.category === currentCategory);
  }

  // Time filter
  if (currentTimeDays !== 'all') {
    const days = parseInt(currentTimeDays);
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    items = items.filter(i => i.date >= cutoffStr);
  }

  // Search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(i =>
      (i.title || '').toLowerCase().includes(q) ||
      (i.summary_ko || '').toLowerCase().includes(q) ||
      (i.summary_zh || '').toLowerCase().includes(q) ||
      (i.hashtags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  return items;
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterTime(days, btn) {
  currentTimeDays = days;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function searchItems() {
  searchQuery = document.getElementById('search-input').value;
  renderCards();
}

// ===== ACTIONS =====
function copyCard(title, summary) {
  const text = decodeURIComponent(title) + '\n\n' + decodeURIComponent(summary);
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

function shareCard(title) {
  const text = decodeURIComponent(title) + '\n\nhttps://bellaliv423.github.io/bella-ai-intel/';
  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Share link copied!'));
  }
}

function shareLink() {
  const isZh = document.body.classList.contains('zh');
  const url = 'https://bellaliv423.github.io/bella-ai-intel/' + (isZh ? '?lang=zh' : '');
  navigator.clipboard.writeText(url).then(() =>
    showToast(isZh ? '連結已複製！' : '링크 복사 완료!')
  );
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

let recData = null;

async function loadRecommendations() {

    const resp = await fetch('data/recommendations.json');

function showDreamTeam(btn) {
  // Toggle active state
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = 'dreamteam';

  const grid = document.getElementById('cards-grid');
  const isZh = document.body.classList.contains('zh');

  if (!recData) {
    grid.innerHTML = `<div class="empty-state">
      <div class="icon">⭐</div>
      <p>${isZh ? '分析資料載入中... 請先執行 analyzer.py' : '분석 데이터 로딩 중... analyzer.py 실행 후 확인하세요'}</p>
    </div>`;
    return;
  }

  let html = '';

  // Section 1: Features
  const features = recData.features || [];
  if (features.length > 0) {
    html += `<div style="grid-column:1/-1"><div class="rec-section-title">🎯 ${isZh ? '適用新功能 Top ' + features.length : '적용 가능 신기능 Top ' + features.length}</div>`;

      const suggestion = isZh ? f.suggestion_zh : f.suggestion_ko;
      const projName = isZh ? f.project_name_zh : f.project_name_ko;
      const impact = isZh ? f.impact_zh : f.impact_ko;
      html += `<div class="rec-card">
        <div class="rec-head">
          <div class="rec-title">${i+1}. ${f.news_title}</div>
          <div class="rec-meta">${f.news_date}</div>
        </div>
        <div class="rec-body">
          <span class="rec-project">${projName}</span>
          <span class="stars" style="margin-left:8px">${f.difficulty_stars}</span>
          <span class="rec-meta" style="margin-left:4px">(${isZh ? (f.difficulty_zh || '') : f.difficulty_ko})</span>
          <span style="margin-left:8px">${impact}</span>
        </div>
        <div class="rec-body">${suggestion}</div>
        ${isZh ? (f.learning_note_zh ? `<div class="learning-note">${f.learning_note_zh}</div>` : '') : (f.learning_note_ko ? `<div class="learning-note">${f.learning_note_ko}</div>` : '')}
      </div>`;
    });
    html += '</div>';
  }

  // Section 2: Upgrades
  const upgrades = recData.upgrades || [];
  if (upgrades.length > 0) {
    html += `<div style="grid-column:1/-1"><div class="rec-section-title">🔧 ${isZh ? '腳本升級點' : '스크립트 업그레이드 포인트'}</div>`;
    upgrades.forEach(u => {
      const projName = isZh ? u.project_name_zh : u.project_name_ko;
      const suggestion = isZh ? u.upgrade_suggestion_zh : u.upgrade_suggestion_ko;
      html += `<div class="rec-card">
        <div class="rec-head">
          <div class="rec-title">⚡ ${u.script_name}</div>
          <div class="stars">${u.difficulty_stars}</div>
        </div>
        <div class="rec-body">
          <span class="rec-project">${projName}</span>
        </div>
        <div class="rec-body">${suggestion}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Section 3: Content
  const content = recData.content || [];
  if (content.length > 0) {
    html += `<div style="grid-column:1/-1"><div class="rec-section-title">📸 ${isZh ? '內容素材推薦' : '콘텐츠 소재 추천'}</div>`;
    content.forEach(c => {
      const title = isZh ? c.title_zh : c.title_ko;
      const desc = isZh ? (c.description_zh || c.description_ko) : c.description_ko;
      const typeName = isZh ? c.type_zh : c.type_ko;
      const tags = (c.hashtags || []).map(t => `<span class="tag">${t}</span>`).join(' ');
      html += `<div class="rec-card">
        <div class="rec-head">
          <div class="rec-title">${c.type_icon} [${typeName}] ${title}</div>
          <div class="rec-meta">${c.news_date || ''}</div>
        </div>

        <div class="card-tags" style="margin-top:6px">${tags}</div>

  }

  grid.innerHTML = html;
}
