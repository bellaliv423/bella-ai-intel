<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #141413;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 6px);
    pointer-events: none; z-index: 100;
  }
  body::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(193,95,60,0.07) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
  }
  .title-block { text-align: center; margin-bottom: 4px; }
  .title-block h1 {
    font-size: 32px; color: #C15F3C;
    text-shadow: 4px 4px 0 #7a3a24, 0 0 40px rgba(193,95,60,0.25);
    letter-spacing: 6px;
  }
  .title-block .subtitle {
    font-family: 'Silkscreen', monospace;
    font-size: 12px; color: #888; margin-top: 6px;
    letter-spacing: 8px; text-transform: uppercase;
  }
  .team-section { text-align: center; }
  .team-label {
    font-size: 10px; letter-spacing: 4px;
    margin-bottom: 12px; padding: 5px 20px;
    display: inline-block; border: 1px solid; border-radius: 3px;
  }
  .team-label.hamsterz { color: #C15F3C; border-color: rgba(193,95,60,0.5); background: rgba(193,95,60,0.1); }
  .team-label.puppyz { color: #5B8DEF; border-color: rgba(91,141,239,0.5); background: rgba(91,141,239,0.1); }
  .characters-row {
    display: flex; justify-content: center; gap: 16px;
  }
  .char {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px; width: 130px;
  }
  .char-name {
    font-size: 8px; letter-spacing: 1px;
    text-shadow: 0 0 8px currentColor;
  }
  .char-role {
    font-family: 'Silkscreen', monospace;
    font-size: 9px; color: #666;
  }
  .char.leader canvas { filter: drop-shadow(0 0 16px rgba(193,95,60,0.5)); }
  .char.leader-p canvas { filter: drop-shadow(0 0 16px rgba(91,141,239,0.5)); }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: rgba(193,95,60,0.25); border-radius: 50%; z-index: 1;
  }
  .badge {
    position: absolute; bottom: 16px; font-family: 'Silkscreen', monospace;
    font-size: 9px; color: #3a3a38; z-index: 10;
  }
  .badge.left { left: 24px; }
  .badge.right { right: 24px; }
  canvas { image-rendering: pixelated; }

function drawSprite(canvas, data, isHamster) {
  const ctx = canvas.getContext('2d');
  const grid = isHamster ? baseHamster() : basePuppy();
  canvas.width = G * PX; canvas.height = G * PX;
  canvas.style.width = (G * PX) + 'px';
  canvas.style.height = (G * PX) + 'px';

  const colorMap = {
    '0': null,
    '1': data.body,
    '2': data.outline,
    '3': data.eyeW,
    '4': data.pupil,
    '5': data.cheek,
    '6': data.accent,
  };

  // Draw base grid
  for (let y = 0; y < G; y++) {
    const row = grid[y] || '';
    for (let x = 0; x < G; x++) {
      const v = row[x] || '0';
      const c = colorMap[v];
      if (!c) continue;
      ctx.fillStyle = c;
      ctx.fillRect(x * PX, y * PX, PX, PX);
    }
  }

  // Draw eye highlights
  ctx.fillStyle = '#FFF';
  ctx.fillRect(4 * PX + 1, 6 * PX + 1, 3, 3);
  ctx.fillRect(10 * PX + 1, 6 * PX + 1, 3, 3);

  // Apply character-specific mods
  if (data.mods) {
    const mods = data.mods();
    mods.forEach(([x, y, color]) => {
      ctx.fillStyle = color;
      ctx.fillRect(x * PX, y * PX, PX, PX);
    });
  }
}

function createCard(data, isHamster) {
  const div = document.createElement('div');
  div.className = 'char' + (data.leader && isHamster ? ' leader' : '') + (data.leader && !isHamster ? ' leader-p' : '');

  const canvas = document.createElement('canvas');
  drawSprite(canvas, data, isHamster);

  const name = document.createElement('div');
  name.className = 'char-name';
  name.style.color = data.nameC;
  name.textContent = data.name;

  const role = document.createElement('div');
  role.className = 'char-role';
  role.textContent = data.role;

  div.appendChild(canvas);
  div.appendChild(name);
  div.appendChild(role);
  return div;
}

// Render
hamsters.forEach(h => document.getElementById('hrow').appendChild(createCard(h, true)));
puppies.forEach(p => document.getElementById('prow').appendChild(createCard(p, false)));

// Stars
for (let i = 0; i < 80; i++) {

  s.style.left = Math.random() * 1920 + 'px';
  s.style.top = Math.random() * 1080 + 'px';
  s.style.opacity = Math.random() * 0.4 + 0.1;
  s.style.width = s.style.height = (Math.random() > 0.6 ? 3 : 2) + 'px';
