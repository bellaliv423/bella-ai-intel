function draw(canvas, data, tpl) {
  const ctx = canvas.getContext('2d');
  canvas.width = S*P; canvas.height = S*P;
  canvas.style.width = S*P+'px'; canvas.style.height = S*P+'px';
  const cm = {'0':null,'1':data.body,'2':data.out,'3':data.ew,'4':data.ep,'5':data.ck,'6':data.ac};

  for(let y=0;y<S;y++){
    const row=tpl[y]||'';
    for(let x=0;x<S;x++){
      const v=row[x]||'0';
      if(cm[v]){ctx.fillStyle=cm[v];ctx.fillRect(x*P,y*P,P,P)}
    }
  }
  // Eye highlights
  ctx.fillStyle='#FFF';
  ctx.fillRect(6*P+1,9*P+1,3,3);
  ctx.fillRect(12*P+1,9*P+1,3,3);
  // Smile
  ctx.fillStyle=data.out;
  ctx.fillRect(8*P,11*P+Math.floor(P*0.6),P,2);
  ctx.fillRect(9*P,11*P+Math.floor(P*0.6),P,2);
  ctx.fillRect(10*P,11*P+Math.floor(P*0.6),P,2);
  // Mods
  if(data.mod) data.mod(ctx,P);
}

function card(d,tpl){
  const div=document.createElement('div');
  div.className='c '+(d.cls||'');
  const cv=document.createElement('canvas');
  draw(cv,d,tpl);
  const nm=document.createElement('div');
  nm.className='nm';nm.style.color=d.nc;nm.textContent=d.n;
  const rl=document.createElement('div');
  rl.className='rl';rl.textContent=d.r;
  div.append(cv,nm,rl);return div;
}
